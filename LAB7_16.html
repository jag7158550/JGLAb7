<html>

<head>
<meta charset="utf-8" />
<title>Mapbox Example 16 - Select Layer </title>

<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>

<style>
    .legend {
        background-color: #fff;
        border-radius: 3px;
        bottom: 30px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        font: 12px/20px 'Helvetica Neue', Arial, Helvetica, sans-serif;
        padding: 10px;
        position: absolute;
        right: 10px;
        z-index: 1;
    }
    .legend h4 { margin: 0 0 10px; }
    .legend div span {
        border-radius: 50%;
        display: inline-block;
        height: 10px;
        margin-right: 5px;
        width: 10px;
    }

    .map-overlay {
        font: 12px/20px 'Helvetica Neue', Arial, Helvetica, sans-serif;
        position: absolute;
        width: 380px;
        min-width: 380px;
        top: 0;
        right: 0;
        padding: 10px;
    }
    .map-overlay .map-overlay-inner {
        background-color: #fff;
        box-shadow:0 1px 2px rgba(0, 0, 0, 0.20);
        border-radius: 3px;
        padding: 10px;
        margin-bottom: 10px;
    }
    .map-overlay h2 { margin: 0 0 10px; }
    .map-overlay p.credit { margin: 0; padding: 0; }

    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
</style>

</head>

<body>
<div id="map"></div>

<div class='map-overlay'> 
    <div class='map-overlay-inner'>
        <h2> Denver Tree Hexagon </h2>
        
        <fieldset>
            <label>Select layer</label>
            <select id="data_layer" name="layer">
                <option value="0">All Genera</option>            
                <option value="1">Ash</option>
                <option value="2">Crabapple</option>
                <option value="3">Elm</option>
                <option value="4">Hackberry</option>
                <option value="5">Honeylocust</option>
                <option value="6">Linden</option>
                <option value="7">Maple</option>
                <option value="8">Oak</option>
                <option value="9">Pine</option>
                <option value="10">Spruce</option>
            </select>
        </fieldset>

        <p class="credit">This map uses hexagons to visualize the tree data.</p>
    </div>
</div>

<script>

mapboxgl.accessToken = 'pk.eyJ1IjoiYmxhemU3MTUiLCJhIjoiY21ua3BnYmh0MHNvdTJycHZrNGxpYWoxbiJ9.herf5qJSWX7XWcrQKeAuYQ';

var map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/blaze715/cmnkwgjuk006101sl98sq2a4h',
    center: [-104.951046, 39.732470],
    zoom: 11
});

map.on('load', function() {

    map.addLayer({
        'id':'denver_tree_point',
        'type':'fill',
        'source':{
            type:'vector',
            url:'mapbox://blaze715.6e2x68ub'
        },
        'source-layer':'denver_hexagon_tree_count_top-4o958s',
        'layout':{
            'visibility': 'visible'
        },
        'paint': {
            'fill-color': [
                'step',
                ['get', 'n_all'],
                '#ffffcc',
                725 * 0.20, '#a1dab4',
                725 * 0.40, '#41b6c4',
                725 * 0.60, '#2c7fb8',
                725 * 0.80, '#253494',
                725, '#081d58'
            ],
            'fill-opacity':0.7,
            'fill-outline-color': 'pink'
        }
    });

});

var lt_genus = [
    "n_all", 
    "n_Ash", "n_Crabapple", 
    "n_Elm", "n_Hackberry", 
    "n_Honeylocust", "n_Linden", 
    "n_Maple", "n_Oak",
    "n_Pine", "n_Spruce"
];

var lt_g_max_range = [
    725, 199, 102, 108, 48,
    182, 140, 171, 170, 254, 94
];

document.getElementById('data_layer').addEventListener('change', function(e){

    var genus_selected = lt_genus[e.target.value];
    var genus_s_max = lt_g_max_range[e.target.value];

    map.setPaintProperty("denver_tree_point", 'fill-color', [
        'step',
        ['get', genus_selected],
        '#ffffcc',
        genus_s_max * 0.20, '#a1dab4',
        genus_s_max * 0.40, '#41b6c4',
        genus_s_max * 0.60, '#2c7fb8',
        genus_s_max * 0.80, '#253494',
        genus_s_max, '#081d58'
    ]);
});

</script>

</body>
</html>
